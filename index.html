<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {

input, textarea, select, button { font-family: inherit; font-size: inherit; }
button { cursor: pointer; }
textarea { resize: vertical; }

/* Shell */
#app { max-width: 480px; margin: 0 auto; height: 100vh; height: 100dvh;

/* Header */
.header { display: flex; align-items: center; padding: 12px 16px; gap: 8px;

/* User info */
.user-bar { display: flex; align-items: center; gap: 8px; padding: 0 16px; }
.user-bar img { width: 22px; height: 22px; border-radius: 50%; }

/* Main area */
.main { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 90px;

.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);

.nav button { background: none; border: none; color: var(--barText); display: flex;

.nav button.act { opacity: 1; }
.nav .navico { font-size: 18px; }
.nav .navlbl { font-size: 10px; }
.nav .center-btn { opacity: 1; position: relative; top: -8px; }
.nav .plus-circle { display: flex; align-items: center; justify-content: center;

  box-shadow: 0 4px 16px rgba(138,114,48,0.3); }

/* Shared: top bar */
.top-bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px 6px;

.back-btn { background: none; border: none; color: var(--text2); font-size: 13px; }

.sub-text { font-size: 12px; color: var(--text3); margin: 0 16px 12px; letter-spacing: .3px; }
.page-wrap { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }

/* Calendar */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 0 16px; }
.cal-arr { background: none; border: none; color: var(--text2); font-size: 22px; padding: 4px 12px; }

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; padding: 0 16px; }
.cal-dh { text-align: center; font-size: 11px; color: var(--text3); padding: 4px 0 6px; font-weight: 500; }
.cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;

.cal-num { font-size: 13px; font-weight: 500; line-height: 1; }
.cal-num.today-n { color: var(--gold); font-weight: 700; }
.cal-dots { display: flex; gap: 2px; margin-top: 3px; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; }
.cal-stat { text-align: center; margin-top: 12px; padding: 8px 16px; border-top: 1px solid var(--border); }
.cal-stat span { font-size: 12px; color: var(--text3); }

/* Cards / forms */
.card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius);

.field-input { background: #fff; border: 1px solid var(--border); border-radius: var(--radius);

.q-block { display: flex; flex-direction: column; gap: 5px; }

.fw-card-name { font-weight: 600; flex: 1; }

.fw-card-qs { display: flex; flex-direction: column; gap: 2px; }

.fw-card-btn { background: none; border: none; color: var(--text2); font-size: 12px; padding: 0; }

.icon-btn.sel { background: var(--bg3); box-shadow: 0 0 0 2px var(--gold); }

.q-list { display: flex; flex-direction: column; gap: 6px; }
.q-item { display: flex; align-items: center; gap: 6px; background: #fff; border-radius: 9px;

.q-item input { flex: 1; background: none; border: none; color: var(--text); outline: none; }
.q-acts { display: flex; gap: 1px; }
.q-act-btn { background: none; border: none; color: var(--text2); font-size: 13px; padding: 2px 5px; }

.pick-fw-ico { width: 30px; height: 30px; border-radius: 8px; display: flex;

.guide-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;

.empty-text { color: var(--text3); }
.empty-hint { font-size: 12px; color: var(--text3); }

/* Toast */
.toast { position: fixed; top: 56px; left: 50%; transform: translateX(-50%);

/* Login */
.login-page { display: flex; flex-direction: column; align-items: center; justify-content: center;

.load-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center;

.load-spin { width: 12px; height: 12px; border-radius: 50%; background: var(--gold);

.load-text { color: var(--text3); font-size: 13px; }

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.85)} }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-8px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 75%{opacity:1} 100%{opacity:0} }

/* View transitions */
.view { display: none; }
.view.active { display: block; }

// ─── Google Fonts Loader ───
function loadGFont(name) {
  if (!name || name === "System") return;
  const id = `gfont-${name.replace(/\s/g, "-")}`;
  if (document.getElementById(id)) return;
  const link = document.createElement("link");
  link.id = id; link.rel = "stylesheet";
  link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(name)}:wght@400;500;600;700&display=swap`;
  document.head.appendChild(link);
}

// ─── AI Functions ───
function tryParseJSON(text) {
  // Extract JSON block from text
  let match = text.match(/```json\s*([\s\S]*?)```/);
  let raw = match ? match[1].trim() : text;
  match = raw.match(/\{[\s\S]*\}/);
  if (!match) return null;
  raw = match[0];
  // Try direct parse first
  try { return JSON.parse(raw); } catch(e) {}
  // Repair common issues: trailing commas, unescaped newlines, truncated end
  let fixed = raw
    .replace(/,\s*([\]}])/g, '$1')           // trailing commas
    .replace(/([^\\])\\n/g, '$1\\\\n')       // unescaped \n in strings
    .replace(/[\x00-\x1f]/g, ' ');           // control chars
  // Try closing truncated JSON
  const opens = (fixed.match(/\{/g)||[]).length;
  const closes = (fixed.match(/\}/g)||[]).length;
  for (let i = 0; i < opens - closes; i++) fixed += '}';
  const openB = (fixed.match(/\[/g)||[]).length;
  const closeB = (fixed.match(/\]/g)||[]).length;
  for (let i = 0; i < openB - closeB; i++) fixed += ']';
  // Remove trailing incomplete key-value
  fixed = fixed.replace(/,\s*"[^"]*"?\s*:?\s*"?[^"]*$/, '');
  // Re-close
  const opens2 = (fixed.match(/\{/g)||[]).length;
  const closes2 = (fixed.match(/\}/g)||[]).length;
  for (let i = 0; i < opens2 - closes2; i++) fixed += '}';
  try { return JSON.parse(fixed); } catch(e2) {}
  return null;
}

async function aiAutoTag(answers, questions) {
  const answered = questions.filter(q => answers[q.id]?.trim());
  if (!answered.length) return {};
  const tagList = SUGGEST_TAGS.map(t=>t.replace("#","")).join("、");
  const qList = answered.map(q=>`[${q.id}] 問：${q.text}\n答：${answers[q.id]}`).join("\n\n");
  const prompt = `以下是一位佛教修行者的每日反省記錄，包含多則問答。請針對「每一則」分別選出 1~3 個最相關的標籤。
可選標籤：${tagList}
回傳格式為 JSON 物件，key 是問題 ID，value 是標籤陣列。例如：
{"dz1":["定課","專注"],"dz3":["身業","懺悔"]}
只回傳 JSON，不要加任何其他文字。

${qList}`;
  try {
    const text = await callGemini(prompt, 500);
    const obj = tryParseJSON(text);
    if (obj) {
      const result = {};
      for (const [qId, tags] of Object.entries(obj)) {
        if (Array.isArray(tags)) result[qId] = tags.map(t=>`#${t.replace("#","")}`);
      }
      return result;
    }
  } catch(e) { console.error("AI auto-tag error:", e); }
  return {};
}

// ─── Calendar ───
function renderCalendar(fs) {
  const y = S.curMonth.getFullYear(), mo = S.curMonth.getMonth();
  const first = new Date(y,mo,1).getDay(), days = new Date(y,mo+1,0).getDate();
  const today = todayK();
  const moK = `${y}-${String(mo+1).padStart(2,"0")}`;
  const count = Object.keys(S.refs).filter(k=>k.startsWith(moK)).length;

  let h = '<div style="padding:10px 0">';
  // User bar
  if (S.user) {
    h += `<div class="user-bar" style="margin-bottom:8px">
      ${S.user.photoURL ? `<img src="${S.user.photoURL}" referrerpolicy="no-referrer">` : ''}
      <span class="uname">${esc(S.user.displayName||'')}</span>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>`;
  }
  // Nav
  h += `<div class="cal-nav">
    <button class="cal-arr" onclick="changeMonth(-1)">‹</button>
    <span class="cal-mo" style="font-size:${fs+2}px">${y}年${MONTHS_ZH[mo]}</span>
    <button class="cal-arr" onclick="changeMonth(1)">›</button>
  </div>`;
  // Grid
  h += '<div class="cal-grid">';
  for (const d of DAYS_ZH) h += `<div class="cal-dh">${d}</div>`;
  for (let i=0; i<first; i++) h += '<div class="cal-cell"></div>';
  for (let d=1; d<=days; d++) {
    const k = `${y}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const r = S.refs[k], isT = k===today;
    const tags = r?.tags || [];
    let dots = '';
    if (r) {
      if (tags.length > 0) {
        dots = '<div class="cal-dots">' + tags.slice(0,3).map(t=>`<span class="cal-dot" style="background:${gc(t)}"></span>`).join('') + '</div>';
      } else {
        dots = '<div class="cal-dots"><span class="cal-dot" style="background:#81B29A"></span></div>';
      }
    }
    h += `<button class="cal-cell click${isT?' today':''}" onclick="goEd('${k}')">
      <span class="cal-num${isT?' today-n':''}">${d}</span>${dots}
    </button>`;
  }
  h += '</div>';
  h += `<div class="cal-stat"><span>本月已記錄 ${count} 天</span></div>`;
  h += '</div>';
  return h;
}

    h += `<div style="display:flex;flex-direction:column;align-items:center;padding:40px 0">
      <div class="load-spin"></div>
      <p style="font-size:13px;color:var(--gold);margin:10px 0 0">✦ 善知識正在分析您的修行…</p>
      ${selSfws.length>0 ? `<p style="font-size:11px;color:var(--text3);margin:4px 0 0">運用：${selSfws.map(s=>s.name).join("、")}</p>` : ''}
    </div>`;
  }

  if (S.guideError && !S.guideLoading) {
    h += `<div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px 0;color:var(--danger)">
      <p style="margin:0;font-size:13px">${esc(S.guideError)}</p>
      <button class="save-btn" style="width:auto;padding:10px 24px;margin:0" onclick="runGuidance()">重試</button>
    </div>`;
  }

  if (S.guideReport && !S.guideLoading) {
    const r = S.guideReport;
    h += '<div style="display:flex;flex-direction:column;gap:10px">';
    // Overview
    h += `<div class="guide-card">
      <div class="guide-card-title">📋 今日總評</div>
      <p class="guide-text" style="font-size:${fs}px">${esc(r.overview?.summary||'')}</p>`;
    if (r.overview?.highlights?.length) {
      h += '<div class="guide-section"><span class="guide-section-label">✨ 亮點</span>';
      r.overview.highlights.forEach(t => {
        h += `<div class="guide-item"><span class="guide-bullet">•</span><span style="font-size:${fs-1}px">${esc(t)}</span></div>`;
      });
      h += '</div>';
    }
    if (r.overview?.concerns?.length) {
      h += '<div class="guide-section"><span class="guide-section-label">⚠ 需留意</span>';
      r.overview.concerns.forEach(t => {
        h += `<div class="guide-item"><span class="guide-bullet" style="color:#c0392b">•</span><span style="font-size:${fs-1}px">${esc(t)}</span></div>`;
      });
      h += '</div>';
    }
    h += '</div>';

    // Per-question
    if (r.perQuestion) {
      h += '<div class="guide-card-title">📝 逐題引導</div>';
      const qMap = {};
      S.activeQs.forEach(q => qMap[q.id] = q);
      for (const [qId, g] of Object.entries(r.perQuestion)) {
        const q = qMap[qId];
        if (!q) continue;
        const isOpen = S.guideExpanded[qId];
        h += `<div class="guide-accordion">
          <button class="guide-acc-head" onclick="toggleGuideQ('${qId}')">
            <span class="q-num" style="width:22px;height:22px">${qId.replace(/\D/g,"")}</span>
            <span style="flex:1;text-align:left;font-size:${fs-1}px;line-height:1.4;color:var(--text2)">${esc(q.text)}</span>
            <span style="font-size:14px;opacity:.4;transition:transform .2s;${isOpen?'transform:rotate(180deg)':''}">▼</span>
          </button>`;
        if (isOpen) {
          h += '<div class="guide-acc-body">';
          if (g.insight) h += `<div class="guide-row"><span class="guide-row-icon">🔍</span><div><span class="guide-row-label">觀察</span><p class="guide-row-text" style="font-size:${fs-1}px">${esc(g.insight)}</p></div></div>`;
          if (g.dharma) h += `<div class="guide-row"><span class="guide-row-icon">📖</span><div><span class="guide-row-label">佛法觀點</span><p class="guide-row-text" style="font-size:${fs-1}px;color:var(--gold);font-style:italic">${esc(g.dharma)}</p></div></div>`;
          if (g.action) h += `<div class="guide-row"><span class="guide-row-icon">✅</span><div><span class="guide-row-label">具體建議</span><p class="guide-row-text" style="font-size:${fs-1}px">${esc(g.action)}</p></div></div>`;
          h += '</div>';
        }
        h += '</div>';
      }
    }

    // Encouragement
    if (r.encouragement) {
      h += `<div class="guide-encourage">
        <span style="font-size:20px">🙏</span>
        <p class="guide-text" style="font-size:${fs}px;font-style:italic;color:var(--gold)">${esc(r.encouragement)}</p>
      </div>`;
    }

    h += `<button class="add-btn" onclick="runGuidance()">🔄 重新分析</button>`;
    if (selSfws.length > 0) {
      h += `<p style="font-size:10px;color:var(--text3);text-align:center;margin:6px 0 0">使用解決框架：${selSfws.map(s=>`${s.icon}${s.name}`).join("、")}</p>`;
    }
    h += '</div>';
  }

  if (!ref0?.answers && !S.guideLoading) {
    h += `<div class="empty-state">
      <p class="empty-text">此日尚無反思記錄</p>
      <button class="save-btn" style="width:auto;padding:10px 24px;margin:8px auto 0" onclick="goEd('${S.selDate}')">前往撰寫</button>
    </div>`;
  }

  h += '</div>';
  return h;
}

// ─── Question Picker ───
function renderQnPicker(fs) {
  if (!S._pickSel) S._pickSel = new Set(S.activeQs.map(q=>q.id));

  let h = `<div class="page-wrap">
    <div class="top-bar">

    <div style="display:flex;flex-direction:column;gap:14px">`;

  S.fws.forEach(fw => {

    const allS = sc===ids.length && ids.length>0;
    h += `<div>
      <div class="pick-fw-head" onclick="togglePickAll('${fw.id}')">
        <span class="pick-fw-ico" style="background:${fw.color}22;color:${fw.color}">${fw.icon}</span>

        <span class="pick-fw-cnt">${sc}/${fw.questions.length}</span>
        <span class="checkbox" style="${allS?`background:${fw.color};border-color:${fw.color}`:''}">${allS?'✓':''}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;padding-left:8px">`;
    fw.questions.forEach(q => {
      const on = S._pickSel.has(q.id);
      h += `<button class="pick-q" style="${on?`background:${fw.color}12;border-color:${fw.color}44`:''}" onclick="togglePick('${q.id}')">
        <span class="checkbox-sm" style="${on?`background:${fw.color};border-color:${fw.color}`:''}">${on?'✓':''}</span>
        <span style="line-height:1.55;color:var(--text2);font-size:${fs-1}px">${esc(q.text)}</span>
      </button>`;
    });
    h += '</div></div>';
  });

  if (!S.fws.length) {
    h += `<div class="empty-state"><p class="empty-text">尚無框架</p>
      <button class="save-btn" style="width:auto;padding:10px 24px;margin:8px auto 0" onclick="goSettings()">前往設定建立</button></div>`;
  }

  h += `</div>
    <div style="display:flex;align-items:center;gap:12px;margin-top:14px">
      <span style="font-size:${fs-1}px;opacity:.5;flex:1">已選 ${S._pickSel.size} 題</span>
      <button class="save-btn" style="flex:1;margin:0" onclick="savePickedQs()">確認選擇</button>
    </div>
  </div>`;
  return h;
}

        <button style="background:none;border:none;color:var(--danger);font-size:12px;padding:2px 6px" onclick="confirmDelSf('${sf.id}','${esc(sf.name)}')">✕</button>
      </div>
    </div>`;
  });
  h += `</div>
      <button class="add-btn" onclick="goSfNew()">＋ 新增解決框架</button>
    </div>

    <div class="field">
      <label class="field-lbl">關於 AI 功能</label>
      <div class="info-box">
        <p>• 自動標籤：儲存反思時，未手動標籤的題目由 AI 自動分析

    <div class="field">
      <label class="field-lbl">AI 提示語（Prompt）</label>
      <textarea class="q-textarea" style="font-size:${fs-1}px;min-height:120px" oninput="S.sfePrompt=this.value" placeholder="引導 AI 如何運用此框架進行分析的指示…">${esc(S.sfePrompt)}</textarea>
      <p style="font-size:10px;color:var(--text3);margin:2px 0 0;line-height:1.5">此提示語會在 AI 修行引導時附加到分析請求中，引導 AI 從此框架的角度給予建議。</p>
    </div>`;

  const valid = S.sfeName.trim() && S.sfePrompt.trim();
  h += `<button class="save-btn" ${valid?'':'disabled'} onclick="saveSfEdit()">儲存解決框架</button></div>`;
  return h;
}

// ═══════════════════════════════════════
// Navigation & Actions (global)
// ═══════════════════════════════════════
window.S = S;

window.goCal = () => { S.view="calendar"; S.subView=null; render(); };
window.goEd = (d) => {
  S.selDate=d; S.view="editor"; S.subView=null;
  const ref0 = S.refs[d];
  S.edAns = ref0?.answers ? {...ref0.answers} : {};
  S.edQTags = ref0?.qTags ? JSON.parse(JSON.stringify(ref0.qTags)) : {};
  S.edSaving = false; S.edAiLoading = false;
  render();
};
window.goSettings = () => { S.view="settings"; S.subView=null; render(); };
window.goFwPick = () => { S.view="fw"; S.subView="pick"; S._pickSel=new Set(S.activeQs.map(q=>q.id)); render(); };
window.goFwEdit = (id) => {
  const fw = S.fws.find(f=>f.id===id);
  if (!fw) return;
  S.editFw = fw;
  S.feName=fw.name; S.feIcon=fw.icon; S.feColor=fw.color;
  S.feQs=fw.questions.map(q=>({...q})); S.feNewQ="";

};
window.goFwNew = () => {
  S.editFw = { id:uid(), name:"", icon:"📿", color:"#C9A96E", questions:[] };
  S.feName=""; S.feIcon="📿"; S.feColor="#C9A96E"; S.feQs=[]; S.feNewQ="";
  S.view="fw"; S.subView="edit"; render();
};
window.goGuidance = (d) => {
  S.selDate=d; S.view="guidance"; S.subView=null;
  S.guideReport=null; S.guideLoading=false; S.guideError=null; S.guideExpanded={};
  render();
  initGuidance();
};

window.changeMonth = (dir) => {
  const y=S.curMonth.getFullYear(), m=S.curMonth.getMonth();
  S.curMonth = new Date(y,m+dir,1);
  render();
};

// ─── Editor actions ───
window.addQTag = (qId, t) => {
  const c = t.startsWith("#") ? t : `#${t}`;
  if (!S.edQTags[qId]) S.edQTags[qId] = [];
  if (!S.edQTags[qId].includes(c)) S.edQTags[qId].push(c);
  render();
};
window.rmQTag = (qId, t) => {
  if (S.edQTags[qId]) S.edQTags[qId] = S.edQTags[qId].filter(x=>x!==t);
  render();
};

window.handleSave = async () => {
  S.edSaving = true; render();
  const hasContent = Object.values(S.edAns).some(v=>v?.trim());
  if (!hasContent) { S.edSaving=false; render(); return; }

  let finalQTags = JSON.parse(JSON.stringify(S.edQTags));
  const needsAi = S.activeQs.filter(q => S.edAns[q.id]?.trim() && (!finalQTags[q.id] || !finalQTags[q.id].length));
  if (needsAi.length > 0) {
    S.edAiLoading = true; render();
    const aiResult = await aiAutoTag(S.edAns, needsAi);
    for (const [qId, tags] of Object.entries(aiResult)) {
      if (!finalQTags[qId] || !finalQTags[qId].length) finalQTags[qId] = tags;
    }
    S.edAiLoading = false;
  }
  S.edQTags = finalQTags;
  const tags = [...new Set(Object.values(finalQTags).flat())];
  const ref0 = S.refs[S.selDate];
  const data = {
    answers: S.edAns, qTags: finalQTags, tags,
    updatedAt: Date.now(), createdAt: ref0?.createdAt || Date.now(), exported: false
  };
  await saveRef(S.selDate, data);
  S.refs[S.selDate] = data;
  S.edSaving = false;
  showToast("已儲存 ✓");
  // Navigate to guidance
  goGuidance(S.selDate);
};

// ─── Guidance actions ───
async function initGuidance() {
  const cached = await loadGuidance(S.selDate);
  if (cached) {
    S.guideReport = cached; render();
  } else if (S.refs[S.selDate]?.answers) {
    runGuidance();
  }
}
window.runGuidance = async () => {
  const ref0 = S.refs[S.selDate];
  if (!ref0?.answers) return;
  S.guideLoading=true; S.guideError=null; render();
  const selSfws = S.solveFws.filter(sf=>S.activeSolveFws.includes(sf.id));
  const result = await aiGuidance(ref0.answers, S.activeQs, selSfws);
  if (result) {
    S.guideReport = result;
    await saveGuidance(S.selDate, result);
  } else {
    S.guideError = "分析未成功，請稍後重試";
  }
  S.guideLoading = false; render();
};
window.toggleGuideQ = (qId) => {
  S.guideExpanded[qId] = !S.guideExpanded[qId]; render();
};

// ─── Framework edit actions ───
window.addFeQ = () => { if (!S.feNewQ.trim()) return; S.feQs.push({id:uid(),text:S.feNewQ.trim()}); S.feNewQ=""; render(); };
window.rmFeQ = (i) => { S.feQs.splice(i,1); render(); };
window.moveFeQ = (i,dir) => {
  const j=i+dir; if(j<0||j>=S.feQs.length) return;
  [S.feQs[i],S.feQs[j]]=[S.feQs[j],S.feQs[i]]; render();
};
window.saveFwEdit = async () => {
  const fw = { ...S.editFw, name:S.feName.trim(), icon:S.feIcon, color:S.feColor, questions:S.feQs };
  await saveFw(fw);
  const idx = S.fws.findIndex(f=>f.id===fw.id);
  if (idx>=0) S.fws[idx]=fw; else S.fws.push(fw);
  showToast("框架已儲存");
  goSettings();
};
window.confirmDelFw = async (id, name) => {
  if (!confirm(`確定刪除「${name}」？`)) return;
  await delFw(id);
  S.fws = S.fws.filter(f=>f.id!==id);
  S.activeQs = S.activeQs.filter(q=>q.fwId!==id);
  await saveSettings({ ...S.settings, activeQuestions:S.activeQs, solveFws:S.solveFws, activeSolveFws:S.activeSolveFws });
  showToast("已刪除");
  render();
};

// ─── Picker actions ───
window.togglePick = (id) => {
  if (S._pickSel.has(id)) S._pickSel.delete(id); else S._pickSel.add(id);
  render();
};
window.togglePickAll = (fwId) => {
  const fw = S.fws.find(f=>f.id===fwId); if(!fw) return;
  const ids = fw.questions.map(q=>q.id);
  const allSel = ids.every(id=>S._pickSel.has(id));
  ids.forEach(id => allSel ? S._pickSel.delete(id) : S._pickSel.add(id));
  render();
};
window.savePickedQs = async () => {
  const aq = [];
  S.fws.forEach(fw => fw.questions.forEach(q => {
    if (S._pickSel.has(q.id)) aq.push({...q, fwId:fw.id, fwName:fw.name, fwIcon:fw.icon});
  }));
  S.activeQs = aq;
  await saveSettings({ ...S.settings, activeQuestions:aq, solveFws:S.solveFws, activeSolveFws:S.activeSolveFws });
  showToast("已更新每日問題");
  goCal();
};

// ─── Settings: Question editing within frameworks ───
window.toggleFwExpand = (fwId) => {
  if (!S._fwExpand) S._fwExpand = {};
  S._fwExpand[fwId] = !S._fwExpand[fwId];
  render();
};

window.saveSettingsQText = async (fwId, qId, newText) => {
  const text = newText.trim();
  if (!text) return;
  const fw = S.fws.find(f=>f.id===fwId);
  if (!fw) return;
  const q = fw.questions.find(q=>q.id===qId);
  if (q) { q.text = text; await saveFw(fw); }
  // Also update in activeQs
  const aq = S.activeQs.find(q=>q.id===qId);
  if (aq) {
    aq.text = text;
    await saveSettings({ ...S.settings, activeQuestions:S.activeQs, solveFws:S.solveFws, activeSolveFws:S.activeSolveFws });
  }
  S._settingsEditQId = null;
  showToast("題目已更新");
  render();
};

window.addSettingsQ = async (fwId, text) => {
  const t = text.trim();
  if (!t) return;
  const fw = S.fws.find(f=>f.id===fwId);
  if (!fw) return;
  fw.questions.push({ id: uid(), text: t });
  await saveFw(fw);
  showToast("已新增問題");
  render();
};

window.delSettingsQ = async (fwId, qId) => {
  const fw = S.fws.find(f=>f.id===fwId);
  if (!fw) return;
  fw.questions = fw.questions.filter(q=>q.id!==qId);
  await saveFw(fw);
  // Also remove from activeQs if present
  S.activeQs = S.activeQs.filter(q=>q.id!==qId);
  await saveSettings({ ...S.settings, activeQuestions:S.activeQs, solveFws:S.solveFws, activeSolveFws:S.activeSolveFws });
  showToast("已刪除問題");
  render();
};

window.moveSettingsQ = async (fwId, idx, dir) => {
  const fw = S.fws.find(f=>f.id===fwId);
  if (!fw) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= fw.questions.length) return;
  const tmp = fw.questions[idx];
  fw.questions[idx] = fw.questions[newIdx];
  fw.questions[newIdx] = tmp;
  await saveFw(fw);
  render();
};

// ─── Settings actions ───
window.setFont = async (id) => {
  const f = FONT_OPTIONS.find(o=>o.id===id);
  if (f) loadGFont(f.name);
  S.settings.fontId = id;
  await saveSettings({ ...S.settings, activeQuestions:S.activeQs, solveFws:S.solveFws, activeSolveFws:S.activeSolveFws });
  render();
};
window.setFontSize = async (id) => {
  S.settings.sizeId = id;
  await saveSettings({ ...S.settings, activeQuestions:S.activeQs, solveFws:S.solveFws, activeSolveFws:S.activeSolveFws });
  render();
};
window.toggleSolveFw = async (id) => {
  if (S.activeSolveFws.includes(id)) S.activeSolveFws = S.activeSolveFws.filter(x=>x!==id);
  else S.activeSolveFws.push(id);
  await saveSettings({ ...S.settings, activeQuestions:S.activeQs, solveFws:S.solveFws, activeSolveFws:S.activeSolveFws });
  render();
};

// ─── Gemini Settings ───
window.saveGeminiSettings = async () => {
  const key = document.getElementById('inpGeminiKey')?.value.trim() || '';
  const model = document.getElementById('inpGeminiModel')?.value.trim() || '';
  S.settings.geminiKey = key;
  S.settings.geminiModel = model;
  await saveSettings({ ...S.settings, activeQuestions:S.activeQs, solveFws:S.solveFws, activeSolveFws:S.activeSolveFws });
  showToast("AI 設定已儲存");
};

// ─── Solve Framework CRUD ───
window.goSfEdit = (id) => {
  const sf = S.solveFws.find(s=>s.id===id);
  if (!sf) return;
  S.sfEditId = sf.id; S.sfeName = sf.name; S.sfeIcon = sf.icon; S.sfeDesc = sf.desc||""; S.sfePrompt = sf.prompt;
  S.view = "solveFwEdit"; S.subView = null; render();
};
window.goSfNew = () => {
  S.sfEditId = uid(); S.sfeName = ""; S.sfeIcon = "⚡"; S.sfeDesc = ""; S.sfePrompt = "";
  S.view = "solveFwEdit"; S.subView = null; render();
};
window.saveSfEdit = async () => {
  const sf = { id:S.sfEditId, name:S.sfeName.trim(), icon:S.sfeIcon, desc:S.sfeDesc.trim(), prompt:S.sfePrompt.trim() };
  const idx = S.solveFws.findIndex(s=>s.id===sf.id);
  if (idx>=0) S.solveFws[idx]=sf; else S.solveFws.push(sf);
  await saveSettings({ ...S.settings, activeQuestions:S.activeQs, solveFws:S.solveFws, activeSolveFws:S.activeSolveFws });
  showToast("解決框架已儲存");
  goSettings();
};
window.confirmDelSf = async (id, name) => {
  if (!confirm(`確定刪除「${name}」？`)) return;
  S.solveFws = S.solveFws.filter(s=>s.id!==id);
  S.activeSolveFws = S.activeSolveFws.filter(x=>x!==id);
  await saveSettings({ ...S.settings, activeQuestions:S.activeQs, solveFws:S.solveFws, activeSolveFws:S.activeSolveFws });
  showToast("已刪除");
  render();
};

// ─── Auth ───
async function doLogin() {
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch(e) {
    console.error("Popup login error:", e.code, e);
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user'
        || e.code === 'auth/cancelled-popup-request') {
      try { await signInWithRedirect(auth, new GoogleAuthProvider()); } catch(e2) {
        showToast("登入失敗：" + (e2.code||e2.message));
      }
    } else if (e.code === 'auth/unauthorized-domain') {
      showToast("請先到 Firebase Console 授權此網域");
    } else {
      showToast("登入失敗：" + (e.code||e.message));
    }
  }
}
window.doLogin = doLogin;
window.doLogout = async () => {
  await signOut(auth);
  S.user = null; S.refs = {}; S.fws = []; S.activeQs = [];
  render();
};

// ─── Init ───
function showLoading() {
  document.getElementById('app').innerHTML = `<div class="load-wrap"><div class="load-spin"></div><p class="load-text">載入中…</p></div>`;
}

// Show login page immediately (before Firebase auth state resolves)
render();

// ─── Handle redirect result ───
getRedirectResult(auth).catch(e => console.error("Redirect result error:", e));

onAuthStateChanged(auth, async (user) => {
  if (user) {
    S.user = { uid: user.uid, displayName: user.displayName, photoURL: user.photoURL };
    currentUid = user.uid;
    showLoading();

    // Load data
    const [allRefs, allFws, stgDoc] = await Promise.all([
      loadAllRefs(), loadAllFws(), loadSettings()
    ]);

    S.refs = allRefs;

    // Settings
    if (stgDoc) {
      if (stgDoc.fontId) S.settings.fontId = stgDoc.fontId;
      if (stgDoc.sizeId) S.settings.sizeId = stgDoc.sizeId;
      if (stgDoc.geminiKey) S.settings.geminiKey = stgDoc.geminiKey;
      if (stgDoc.geminiModel) S.settings.geminiModel = stgDoc.geminiModel;
      if (stgDoc.activeQuestions) S.activeQs = stgDoc.activeQuestions;
      if (stgDoc.solveFws) S.solveFws = stgDoc.solveFws;
      if (stgDoc.activeSolveFws) S.activeSolveFws = stgDoc.activeSolveFws;
    }

    // Frameworks - init presets if empty
    if (allFws.length === 0) {
      for (const f of PRESET_FRAMEWORKS) await saveFw(f);
      S.fws = [...PRESET_FRAMEWORKS];
      if (!S.activeQs.length) {
        const dAq = PRESET_FRAMEWORKS[0].questions.map(q => ({...q, fwId:"dizang", fwName:"地藏經", fwIcon:"🌏"}));
        S.activeQs = dAq;
      }
    } else {
      S.fws = allFws;
    }

    // Default active solve fws
    if (!S.activeSolveFws.length && !stgDoc?.activeSolveFws) {
      S.activeSolveFws = PRESET_SOLVE_FWS.slice(0,2).map(s=>s.id);
    }

    // Save initial settings if first time
    if (!stgDoc) {
      await saveSettings({ ...S.settings, activeQuestions:S.activeQs, solveFws:S.solveFws, activeSolveFws:S.activeSolveFws });
    }

    applyFont();
    render();
  } else {
    S.user = null;
    currentUid = null;
    render();
  }
});

// ─── Service Worker Registration ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
